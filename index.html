<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroPlay - Clean Web Emulator</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --container-bg: #1f2833;
            --accent-color: #45f3ff;
            --text-color: #c5c6c7;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 1px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(69, 243, 255, 0.3);
        }

        .subtitle {
            margin: 0 0 25px 0;
            font-size: 1rem;
            color: #85929E;
        }

        #emulator-container {
            width: 720px;
            height: 480px;
            max-width: 95%;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7), 
                        0 0 20px rgba(69, 243, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease;
        }

        #game {
            width: 100%;
            height: 100%;
        }

        .status-bar {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #626D71;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            box-shadow: 0 0 8px #2ecc71;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }
    </style>
</head>
<body>

    <h1>RetroPlay</h1>
    <p class="subtitle">Drop your legal ROM to play. Your progress auto-saves locally!</p>

    <div id="emulator-container">
        <div id="game"></div>
    </div>

    <div class="status-bar">
        <span class="pulse-dot"></span>
        <span>Local Save System Active</span>
    </div>

    <script type="text/javascript">
        EJS_player = '#game';
        EJS_core = 'gba'; 
        
        // POINT 1: Use the official binary CDN where EmulatorJS stores its WebAssembly compiled cores
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/'; 
        
        EJS_startOnLoaded = false; 

        // POINT 2: Force single-threading. 
        // This is the absolute key to preventing the CORS/SharedArrayBuffer network errors on free hosts.
        EJS_threads = false; 

        // SAVING CONFIGURATIONS:
        EJS_gameName = "retro_save_slot"; 
        EJS_fixedSaveInterval = 10000;    
        EJS_defaultOptions = {
            "save-state-location": "browser" 
        };
    </script>
    
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

</body>
</html>
