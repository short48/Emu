<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroPlay GB - Pure JS Emulator</title>
    <script src="https://cdn.jsdelivr.net/gh/taisel/GameBoy-Online@master/js/other/XAudioServer.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/taisel/GameBoy-Online@master/js/GameBoyCore.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/taisel/GameBoy-Online@master/js/GameBoyIO.js"></script>
    <style>
        :root {
            --bg-color: #0b0c10;
            --accent-color: #45f3ff;
            --text-color: #c5c6c7;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(69, 243, 255, 0.3);
        }

        .subtitle {
            margin: 0 0 20px 0;
            font-size: 0.9rem;
            color: #85929E;
            text-align: center;
        }

        #emulator-card {
            background: #151b24;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Screen matches the classic Game Boy screen ratio */
        #screen-container {
            width: 320px;
            height: 288px;
            background: #111;
            border-radius: 8px;
            overflow: hidden;
            border: 4px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        #file-input-label {
            margin-top: 15px;
            padding: 10px 20px;
            background-color: var(--accent-color);
            color: #000;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        #file-input-label:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(69, 243, 255, 0.4);
        }

        input[type="file"] {
            display: none;
        }

        .controls-hint {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #626D71;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h1>RetroPlay GB</h1>
    <p class="subtitle">Select a Game Boy (.gb) or Game Boy Color (.gbc) ROM to play!</p>

    <div id="emulator-card">
        <div id="screen-container">
            <canvas id="mainCanvas"></canvas>
        </div>

        <label id="file-input-label" for="file-input">Choose ROM File</label>
        <input type="file" id="file-input" accept=".gb,.gbc">

        <div class="controls-hint">
            <strong>Controls:</strong> Arrow Keys = D-Pad | Z = A | X = B<br>
            Enter = Start | Shift = Select
        </div>
    </div>

    <script>
        let gameboy = null;
        const canvas = document.getElementById('mainCanvas');
        const fileInput = document.getElementById('file-input');

        // Handle file selection
        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const romData = event.target.result;
                
                // Initialize the gameboy core safely
                try {
                    // Clean up any old instance
                    if (gameboy) {
                        gameboy.stop();
                    }
                    
                    // Create a new GameBoy instance on our canvas
                    gameboy = new GameBoy(canvas, romData);
                    gameboy.start();
                    
                    // Hook up keyboard inputs
                    window.onkeydown = function(e) {
                        if (gameboy) {
                            gameboy.KeyDown(e.keyCode);
                            // Prevent page scrolling on arrow keys
                            if([32, 37, 38, 39, 40].indexOf(e.keyCode) > -1) e.preventDefault();
                        }
                    };
                    window.onkeyup = function(e) {
                        if (gameboy) gameboy.KeyUp(e.keyCode);
                    };
                    
                } catch(err) {
                    alert("Error loading ROM: " + err.message);
                }
            };
            reader.readAsBinaryString(file);
        });
    </script>

</body>
</html>
